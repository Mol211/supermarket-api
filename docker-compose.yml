version: '1'

services:
    supermarketsystem:
        # nombre de la app establecido en application.properties
        build: sales-system # nombre de la carpeta donde está el dockerfile
        mem_limit: 512m
        ports:
            - "8080:8080"
        environment:
            DB_URL: jdbc:mysql://supermarketsystemdb:3306/supermarketsystemdb?createDatabaseIfNotExist=true&serverTimezone=UTC
            DB_USER_NAME: root
            DB_PASSWORD: 1234
        restart: always
        depends_on:
            supermarketsystemdb:
                condition: service_healthy
    supermarketsystemdb:
        # configuraciones bd dockerizada
        image: mysql:8.0.33 #misma versión que en pom
        ports:
            - "13306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: 1234
            MYSQL_PASSWORD: 1234
            MYSQL_DATABASE: supermarketsystemdb
        restart: always
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            timeout: 10s
            retries: 10
